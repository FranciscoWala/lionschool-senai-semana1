<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LionSchool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style/style.css">
</head>
<body>
    <header class="faixa_azul_header">
        <div class="itens_separados">
                <img src="/imagens-projeto/logo-lionschool.png" alt=" Imagem logo com texto LionSchool">
                <img src="/imagens-projeto/sair.png" alt=" Ícone com texto de saída">
        </div>
    </header>

    <main>
        <div class="conteiner_principal">
            
            <div class="coluna_esquerda">

                <div class="texto">
                    <h1>Escolha um <span>curso</span></h1>
                    <h1>para gerenciar</h1>
                </div>
            
                <div class="dispositivos">
                    <img src="/imagens-projeto/devices.png" alt=" dispositivos, mobile, desktop e tablet">
                </div>

            </div>

            <div class="coluna_central">
                
                <div class="imagem_estudante">
                    <img src="/imagens-projeto/studant.png" alt="Garota estudante">
                </div>

            </div>

            <div class="coluna_direita">
                <div class="curso_DS">
                    <img src="/imagens-projeto/icon-fechamento-tag.png" alt="ícone fechamento de tag">
                    DS
                </div>
                <div class="curso_REDES">
                    <img src="/imagens-projeto/icon-redes.png" alt="ícone de redes">
                    REDES
                </div>
            </div>

        </div>
        
    </main>
        
    <footer class="faixa_azul_footer">

    </footer>
</body>
</html>
